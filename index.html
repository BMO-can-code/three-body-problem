<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three-Body Problem Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container"></div>

  <div id="ui">
    <div class="title">Three-Body Problem</div>
    <div class="controls">
      <button id="pauseBtn" title="Play/Pause">⏸</button>
      <button id="resetBtn" title="Reset">↺</button>
      <div class="control-group">
        <label for="speedSlider">Speed</label>
        <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
        <span id="speedLabel">1.0×</span>
      </div>
      <div class="control-group">
        <label><input type="checkbox" id="trailToggle" checked> Trails</label>
      </div>
    </div>
    <div class="info">Drag to orbit · Scroll to zoom · Figure-8 orbit</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
