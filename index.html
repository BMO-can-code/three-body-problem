<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three-Body Problem Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container"></div>

  <div id="ui">
    <div class="title">Three-Body Problem</div>

    <div class="controls">
      <button id="pauseBtn" title="Play/Pause">⏸</button>
      <button id="resetBtn" title="Reset">↺</button>
      <button id="perturbBtn" title="Perturb (nudge to see chaos)">⟳</button>

      <select id="presetSelect">
        <option>Figure-8</option>
        <option>Butterfly I</option>
        <option>Butterfly II</option>
        <option>Moth I</option>
        <option>Chaotic</option>
      </select>

      <div class="control-group">
        <label for="speedSlider">Speed</label>
        <input type="range" id="speedSlider" min="0.1" max="5" step="0.1" value="1">
        <span id="speedLabel">1.0×</span>
      </div>

      <label class="toggle"><input type="checkbox" id="trailToggle" checked> Trails</label>
      <label class="toggle"><input type="checkbox" id="autoRotateToggle"> Orbit</label>
    </div>

    <div class="energy">
      <span>KE <span id="keValue">0.0000</span></span>
      <span class="sep">|</span>
      <span>PE <span id="peValue">0.0000</span></span>
      <span class="sep">|</span>
      <span>E <span id="totalValue">0.0000</span></span>
    </div>

    <div class="info">Drag orbit · Scroll zoom · Space pause · R reset · P perturb</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="script.js"></script>
</body>
</html>
